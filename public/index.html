<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SexKit Clinic</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: 'Courier New', monospace; display: flex; height: 100vh; }

  /* Clinic canvas */
  #clinic { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  canvas { border: 2px solid #333; border-radius: 8px; image-rendering: pixelated; }
  #clinic h1 { font-size: 14px; color: #666; margin-top: 10px; letter-spacing: 2px; }

  /* Sidebar */
  #sidebar { width: 380px; background: #16213e; border-left: 1px solid #333; display: flex; flex-direction: column; }
  #agents { padding: 12px; flex-shrink: 0; }
  .agent-card { padding: 8px 10px; margin-bottom: 6px; border-radius: 6px; background: #1a1a2e; border-left: 3px solid; cursor: pointer; }
  .agent-card:hover { background: #222; }
  .agent-name { font-size: 12px; font-weight: bold; }
  .agent-status { font-size: 10px; color: #888; margin-top: 2px; }
  .agent-status.thinking { color: #ff9800; }
  .agent-status.idle { color: #4caf50; }
  .agent-status.error { color: #f44336; }

  /* Chat */
  #chat-area { flex: 1; display: flex; flex-direction: column; border-top: 1px solid #333; }
  #chat-header { padding: 8px 12px; background: #1a1a2e; font-size: 11px; color: #888; }
  #messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 12px; }
  .msg { margin-bottom: 8px; padding: 6px 8px; border-radius: 6px; max-width: 90%; line-height: 1.4; }
  .msg.user { background: #1e3a5f; align-self: flex-end; margin-left: auto; }
  .msg.agent { background: #2a2a3e; }
  .msg.system { background: #333; color: #888; font-size: 10px; text-align: center; max-width: 100%; }
  #input-area { padding: 8px; display: flex; gap: 6px; border-top: 1px solid #333; }
  #input-area input { flex: 1; background: #1a1a2e; border: 1px solid #444; color: #e0e0e0; padding: 6px 10px; border-radius: 4px; font-family: inherit; font-size: 12px; }
  #input-area button { background: #e91e63; color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 11px; }
  #input-area button:hover { background: #c2185b; }

  /* Activity feed */
  #feed { padding: 8px 12px; border-top: 1px solid #333; max-height: 120px; overflow-y: auto; font-size: 10px; color: #666; }
  .feed-item { margin-bottom: 3px; }
  .feed-time { color: #444; }
</style>
</head>
<body>

<div id="clinic">
  <canvas id="canvas" width="640" height="400"></canvas>
  <h1>SEXKIT CLINIC</h1>
</div>

<div id="sidebar">
  <div id="agents"></div>

  <div id="chat-area">
    <div id="chat-header">Chat with: <span id="active-agent">receptionist</span></div>
    <div id="messages"></div>
    <div id="input-area">
      <input id="msg-input" placeholder="Type as patient..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <div id="feed"></div>
</div>

<script>
// ── State ──
let state = { agents: {}, events: [], currentVisit: null };
let activeAgent = 'receptionist';
let chatHistory = {};

// ── Pixel Art Rendering ──
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const TILE = 40;
const COLS = 16;
const ROWS = 10;

// Clinic layout (simple grid)
const ROOMS = {
  // Reception area (left)
  reception: { x: 0, y: 0, w: 5, h: 5, color: '#1e293b', label: 'Reception' },
  waiting: { x: 0, y: 5, w: 5, h: 5, color: '#172033', label: 'Waiting Room' },
  // Clinical area (right)
  exam1: { x: 5, y: 0, w: 6, h: 5, color: '#1a2744', label: 'Exam Room 1' },
  exam2: { x: 5, y: 5, w: 6, h: 5, color: '#1a2744', label: 'Exam Room 2' },
  // Offices (far right)
  attending: { x: 11, y: 0, w: 5, h: 5, color: '#1e3322', label: "Attending Office" },
  admin: { x: 11, y: 5, w: 5, h: 5, color: '#332a1e', label: 'Admin Office' },
};

// Agent positions (grid coordinates)
const AGENT_POS = {
  receptionist: { x: 2, y: 2, room: 'reception' },
  intern:       { x: 7, y: 2, room: 'exam1' },
  attending:    { x: 13, y: 2, room: 'attending' },
  admin:        { x: 13, y: 7, room: 'admin' },
};

// Patient (in waiting room or exam room)
let patientPos = { x: 2, y: 7 };
let patientInExam = false;

function drawClinic() {
  ctx.fillStyle = '#0f0f1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw rooms
  for (const [id, room] of Object.entries(ROOMS)) {
    ctx.fillStyle = room.color;
    ctx.fillRect(room.x * TILE, room.y * TILE, room.w * TILE, room.h * TILE);

    // Room border
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.strokeRect(room.x * TILE, room.y * TILE, room.w * TILE, room.h * TILE);

    // Room label
    ctx.fillStyle = '#444';
    ctx.font = '9px monospace';
    ctx.fillText(room.label, room.x * TILE + 4, room.y * TILE + 12);
  }

  // Draw desks (small rectangles)
  for (const [id, pos] of Object.entries(AGENT_POS)) {
    ctx.fillStyle = '#2a2a3e';
    ctx.fillRect(pos.x * TILE - 12, pos.y * TILE + 14, 24, 8);
  }

  // Draw agents
  for (const [id, pos] of Object.entries(AGENT_POS)) {
    const agent = state.agents[id];
    if (!agent) continue;

    const x = pos.x * TILE;
    const y = pos.y * TILE;
    const color = agent.color || '#888';
    const isActive = id === activeAgent;
    const isThinking = agent.status === 'thinking';

    // Body (pixel character)
    ctx.fillStyle = color;
    // Head
    ctx.fillRect(x - 4, y - 10, 8, 8);
    // Body
    ctx.fillRect(x - 5, y - 2, 10, 10);
    // Legs
    ctx.fillRect(x - 5, y + 8, 4, 6);
    ctx.fillRect(x + 1, y + 8, 4, 6);

    // Eyes (blink when thinking)
    if (!isThinking || Math.floor(Date.now() / 300) % 2 === 0) {
      ctx.fillStyle = '#fff';
      ctx.fillRect(x - 3, y - 7, 2, 2);
      ctx.fillRect(x + 1, y - 7, 2, 2);
    }

    // Status indicator
    if (isThinking) {
      // Thinking dots animation
      const dots = '.'.repeat((Math.floor(Date.now() / 500) % 3) + 1);
      ctx.fillStyle = '#ff9800';
      ctx.font = 'bold 10px monospace';
      ctx.fillText(dots, x + 8, y - 4);
    }

    // Selection ring
    if (isActive) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, y + 2, 14, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Name label
    ctx.fillStyle = '#888';
    ctx.font = '8px monospace';
    const label = id.charAt(0).toUpperCase() + id.slice(1);
    ctx.fillText(label, x - ctx.measureText(label).width / 2, y + 22);
  }

  // Draw patient
  const px = patientPos.x * TILE;
  const py = patientPos.y * TILE;
  ctx.fillStyle = '#64b5f6';
  ctx.fillRect(px - 4, py - 10, 8, 8);
  ctx.fillRect(px - 5, py - 2, 10, 10);
  ctx.fillRect(px - 5, py + 8, 4, 6);
  ctx.fillRect(px + 1, py + 8, 4, 6);
  ctx.fillStyle = '#fff';
  ctx.fillRect(px - 3, py - 7, 2, 2);
  ctx.fillRect(px + 1, py - 7, 2, 2);
  ctx.fillStyle = '#888';
  ctx.font = '8px monospace';
  ctx.fillText('Patient', px - 14, py + 22);
}

// ── UI Updates ──

function updateAgentCards() {
  const container = document.getElementById('agents');
  container.innerHTML = '';
  for (const [id, agent] of Object.entries(state.agents)) {
    const card = document.createElement('div');
    card.className = 'agent-card';
    card.style.borderColor = agent.color;
    if (id === activeAgent) card.style.background = '#222';
    card.onclick = () => { activeAgent = id; updateUI(); };
    card.innerHTML = `
      <div class="agent-name" style="color:${agent.color}">${agent.name}</div>
      <div class="agent-status ${agent.status}">${agent.status}${agent.currentTask ? ' — ' + agent.currentTask : ''}</div>
    `;
    container.appendChild(card);
  }
}

function updateFeed() {
  const feed = document.getElementById('feed');
  feed.innerHTML = state.events.map(e => {
    const time = new Date(e.time).toLocaleTimeString();
    return `<div class="feed-item"><span class="feed-time">${time}</span> <b>${e.agent}</b>: ${e.action}</div>`;
  }).join('');
}

function updateChat() {
  document.getElementById('active-agent').textContent = activeAgent;
  const container = document.getElementById('messages');
  const history = chatHistory[activeAgent] || [];
  container.innerHTML = history.map(m =>
    `<div class="msg ${m.role}">${m.content}</div>`
  ).join('');
  container.scrollTop = container.scrollHeight;
}

function updateUI() {
  updateAgentCards();
  updateFeed();
  updateChat();
}

// ── Chat ──

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  if (!chatHistory[activeAgent]) chatHistory[activeAgent] = [];
  chatHistory[activeAgent].push({ role: 'user', content: text });
  updateChat();

  // Move patient toward active agent
  const agentPos = AGENT_POS[activeAgent];
  if (agentPos) {
    patientPos = { x: agentPos.x - 2, y: agentPos.y };
  }

  try {
    const res = await fetch('/api/message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agent: activeAgent, message: text }),
    });
    const data = await res.json();
    chatHistory[activeAgent].push({ role: 'agent', content: data.response });
    updateChat();
  } catch (e) {
    chatHistory[activeAgent].push({ role: 'system', content: `Error: ${e.message}` });
    updateChat();
  }
}

document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});

// ── WebSocket ──

function connectWS() {
  const ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'state') {
      state = data;
      updateUI();
    }
  };
  ws.onclose = () => setTimeout(connectWS, 2000);
}

// ── Animation Loop ──

function animate() {
  drawClinic();
  requestAnimationFrame(animate);
}

// ── Init ──

// Load initial state
fetch('/api/state').then(r => r.json()).then(s => {
  // Build initial state from server
  state.agents = Object.fromEntries(
    Object.entries(s.agents).map(([id, a]) => [id, {
      name: a.name, color: a.color, desk: a.desk,
      status: a.status || 'idle', currentTask: a.currentTask || null,
    }])
  );
  state.events = s.events || [];
  updateUI();
});

connectWS();
animate();
</script>
</body>
</html>
